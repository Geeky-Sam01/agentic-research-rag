services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - qdrant_data:/app/qdrant_db # Persist Qdrant data
      - ./backend/uploads:/app/uploads # Persist uploaded files
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
