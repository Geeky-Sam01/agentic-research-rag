server {
    listen 80;

    # Angular SPA — serve index.html for all non-API routes
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/ requests to the backend container
    location /api/ {
        # Use a resolver and variables to prevent Nginx from crashing if backend is down on startup
        resolver 127.0.0.11 valid=30s;
        set $backend_target ${BACKEND_URL};
        proxy_pass $backend_target;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Required for SSE streaming (your chat endpoint)
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
    }
}
