<div class="h-full flex flex-col bg-[#fafafa]">
  <!-- Header Area -->
  <header class="p-8 pb-6 flex items-end justify-between">
    <div>
      <h1 class="text-3xl font-black text-[#171717] tracking-tighter uppercase mb-1">Knowledge Library</h1>
      <p class="text-sm text-stone-500 font-medium">Manage document indexing and automated discovery.</p>
    </div>

    <div class="flex items-center gap-4">
      @if (status() === 'uploading') {
        <div class="flex items-center gap-2 px-3 py-1.5 bg-stone-100 rounded-full">
          <div class="micro-loader"></div>
          <span class="text-[10px] font-black text-stone-500 uppercase tracking-widest leading-none">Indexing Library</span>
        </div>
      }
      
      <div class="flex items-center gap-2">
        <p-button (onClick)="fileInput.click()" 
                  icon="pi pi-plus" 
                  label="Add Document" 
                  [loading]="status() === 'uploading'"
                  class="knowledge-btn" />
        
        <p-button (onClick)="clearKnowledge()" 
                  icon="pi pi-trash" 
                  label="Clear Library" 
                  class="clear-btn" />
      </div>
      
      <input #fileInput type="file" (change)="onFileSelected($event)" accept=".pdf" class="hidden">
    </div>
  </header>

  <!-- Content Area: File Table -->
  <main class="flex-1 px-8 pb-8 overflow-y-auto">
    <div class="bg-white border border-stone-200 rounded-xl shadow-sm overflow-hidden min-h-[400px]">
      @if (fileList().length === 0 && status() === 'idle') {
      <div class="flex flex-col items-center justify-center h-[400px] text-stone-300">
        <i class="pi pi-inbox text-5xl mb-4"></i>
        <p class="text-sm font-bold uppercase tracking-widest">No documents indexed yet.</p>
      </div>
      } @else {
      <p-table [value]="fileList()" [tableStyle]="{ 'min-width': '50rem' }"
        styleClass="p-datatable-sm monochromatic-table">
        <ng-template pTemplate="header">
          <tr>
            <th class="w-[50%]">File Name</th>
            <th>Type</th>
            <th>Uploaded At</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-file>
          <tr>
            <td class="font-bold text-[#171717]">
              <div class="flex items-center gap-2">
                <i class="pi pi-file-pdf text-stone-400"></i>
                {{ file.name }}
              </div>
            </td>
            <td>
              <span class="px-2 py-0.5 rounded bg-stone-100 text-stone-500 text-[10px] font-black uppercase">
                {{ file.type }}
              </span>
            </td>
            <td class="text-xs text-stone-400 tabular-nums">
              {{ file.uploadedAt }}
            </td>
          </tr>
        </ng-template>
      </p-table>
      }
    </div>
  </main>
</div>
