<header class="flex items-center justify-between px-6 py-3 bg-panel flex-shrink-0">

  <!-- Left: mobile panel trigger + session title -->
  <div class="flex items-center gap-4">
    <!-- Sources button (mobile only) -->
    <button
      class="lg:hidden flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs transition-all text-text-secondary border border-border hover:bg-accent-soft active:scale-95"
      (click)="uiState.toggleSources()">
      <i class="pi pi-database text-xs text-accent"></i>
      Sources
    </button>

    <h1 class="text-[15px] font-semibold text-text-primary truncate max-w-xs lg:max-w-sm">
      {{ currentTitle() }}
    </h1>
  </div>

  <!-- Right: actions -->
  <div class="flex items-center gap-2">
    <!-- Evidence button (mobile only) -->
    @if (chatService.chunks().length > 0) {
    <button
      class="lg:hidden flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs transition-all text-accent border border-accent/20 bg-accent-soft hover:bg-accent/10 active:scale-95"
      (click)="uiState.openEvidence()">
      <i class="pi pi-book text-xs"></i>
      Chunks ({{ chatService.chunks().length }})
    </button>
    }

    <!-- Clear chat -->
    @if (chatService.messages().length > 0) {
    <button
      class="flex items-center gap-2 px-3 py-2 rounded-lg text-xs transition-all text-text-secondary hover:text-text-primary hover:bg-border-soft active:scale-95"
      pTooltip="Clear conversation" tooltipPosition="bottom" (click)="chatService.clearMessages()">
      <i class="pi pi-trash text-xs"></i>
      <span class="hidden sm:inline">Reset</span>
    </button>
    }
  </div>
</header>
