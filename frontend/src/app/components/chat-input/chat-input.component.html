<!-- ═══════════════════════════════════════════════════
     CENTERED MODE — Hero landing input (like reference)
     ═══════════════════════════════════════════════════ -->
@if (isCentered) {
  <div class="centered-wrapper">
    <div class="centered-box" [class.is-large]="isLarge()">

      <!-- Textarea row -->
      <div class="centered-textarea-row">
        <textarea pInputTextarea
          [(ngModel)]="inputValue"
          [autoResize]="true"
          [rows]="1"
          [disabled]="chatService.loading()"
          [placeholder]="isStructuredMode ? 'Structured Mode: Extract metrics and data tables...' : 'Explainer Mode: Ask financial questions...'"
          class="centered-textarea"
          spellcheck="false"
          autocomplete="off"
          (focus)="focused.set(true)"
          (blur)="focused.set(false)"
          (keydown)="onKeydown($event)"
        ></textarea>
      </div>

      <!-- Action bar row -->
      <div class="centered-actions">
        <!-- Left: action chips -->
        <div class="centered-chips">
          <p-select [options]="models" 
                   [(ngModel)]="selectedModel" 
                   optionLabel="label" 
                   optionValue="value"
                   class="model-select"
                   [appendTo]="'body'"
                   title="Select AI Model">
          </p-select>
          <div class="v-divider"></div>
          <button class="chip-icon" title="Attach file">
            <i class="pi pi-paperclip"></i>
          </button>
          <button class="chip-pill" title="Deep Search">
            <i class="pi pi-globe"></i>
            <span>Deep Search</span>
          </button>
          <p-togglebutton 
                [(ngModel)]="isStructuredMode" 
                [onLabel]="'Structured Mode'" 
                [offLabel]="'Explainer Mode'" 
                class="explainer-toggle"
                title="Toggle JSON Structured Outputs (Tables/Cards)">
          </p-togglebutton>
        </div>

        <!-- Right: send button -->
        <button class="centered-send"
                [class.can-send]="canSend()"
                [disabled]="!canSend()"
                (click)="sendMessage()">
          @if (chatService.loading()) {
            <i class="pi pi-spin pi-spinner"></i>
          } @else {
            <i class="pi pi-arrow-up"></i>
          }
        </button>
      </div>
    </div>

    <!-- Glow line removed -->
  </div>
}

<!-- ═══════════════════════════════════════════════════
     BOTTOM MODE — Compact chat input bar
     ═══════════════════════════════════════════════════ -->
@if (!isCentered) {
  <div class="bottom-wrapper">
    <div class="bottom-inner">
      <div class="google-search-bar"
           [class.active-focus]="focused()"
           [class.is-large]="isLarge()">
        
        @if (!isLarge()) {
          <button class="gsb-plus" title="Add file">
            <i class="pi pi-plus text-sm"></i>
          </button>
        }

        <!-- Main Textarea -->
        <textarea pInputTextarea
          [(ngModel)]="inputValue"
          [autoResize]="true"
          [rows]="1"
          [disabled]="chatService.loading()"
          [placeholder]="isStructuredMode ? 'Structured Mode: Request metrics, tables, and structured insights...' : 'Explainer Mode: Ask anything...'"
          class="gsb-textarea"
          spellcheck="false"
          autocomplete="off"
          (focus)="focused.set(true)"
          (blur)="focused.set(false)"
          (keydown)="onKeydown($event)"
        ></textarea>

        <!-- Right Icons Group (Grouped on right when large) -->
        <div class="gsb-actions">
          @if (isLarge()) {
            <button class="gsb-icon-btn" title="Add file">
              <i class="pi pi-plus text-sm"></i>
            </button>
          }

          <div class="gsb-actions-group">
            <button class="gsb-icon-btn" title="Deep Search">
              <i class="pi pi-globe text-base"></i>
            </button>
            
            <p-togglebutton 
                  [(ngModel)]="isStructuredMode" 
                  [onLabel]="'Structured Mode'" 
                  [offLabel]="'Explainer Mode'" 
                  class="gsb-explainer-toggle"
                  title="Toggle Output Architecture">
            </p-togglebutton>
  
            <div class="v-separator"></div>
  
            <!-- Model Select (Google Style Dropdown) -->
            <p-select [options]="models" 
                     [(ngModel)]="selectedModel" 
                     optionLabel="label" 
                     optionValue="value"
                     class="gsb-model-select"
                     [appendTo]="'body'">
            </p-select>
  
            <!-- Integrated Send Button -->
            <button class="gsb-send"
                    [class.can-send]="canSend()"
                    [disabled]="!canSend()"
                    (click)="sendMessage()">
              @if (chatService.loading()) {
                <i class="pi pi-spin pi-spinner text-sm"></i>
              } @else {
                <i class="pi pi-send text-sm"></i>
              }
            </button>
          </div>
        </div>
      </div>

      <!-- Hints -->
      <div class="bottom-hints">
        <span>ENTER TO SEND</span>
        <span class="hint-dot"></span>
        <span>SHIFT+ENTER FOR NEW LINE</span>
      </div>
    </div>
  </div>
}
