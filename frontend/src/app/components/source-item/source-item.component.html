<div class="source-item group flex items-center justify-between px-3.5 py-4 rounded-xl transition-all cursor-pointer select-none bg-panel border-border mb-2 relative overflow-hidden active:scale-98">

  <div class="flex items-center gap-4 overflow-hidden relative z-10">
    <!-- Icon Box -->
    <div class="file-icon-box w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 bg-bg-soft border border-border group-hover:bg-accent-soft group-hover:border-accent transition-all duration-300 shadow-sm">
      <i class="pi pi-file-pdf text-text-muted text-[16px] group-hover:text-accent transition-colors duration-300"></i>
    </div>

    <!-- Metadata Content -->
    <div class="flex flex-col min-w-0">
      <span class="text-[13px] font-bold truncate text-text-primary group-hover:text-accent transition-colors duration-300" [title]="name">
        {{ shortName() }}
      </span>
      <div class="flex items-center gap-1.5 mt-1">
        <span class="status-dot w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
        <span class="text-[9px] text-text-muted font-bold uppercase tracking-widest leading-none">Indexed & Ready</span>
      </div>
    </div>
  </div>

  <div class="check-box relative z-10 opacity-40 group-hover:opacity-100 transition-all duration-300">
    <i class="pi pi-check-circle text-accent text-sm"></i>
  </div>

  <!-- Selection Indicator Shadow Effect -->
  <div class="absolute inset-0 bg-gradient-to-r from-accent/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
</div>
