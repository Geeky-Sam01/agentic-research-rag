<div class="flex h-screen w-full bg-bg-main overflow-hidden text-text-primary select-none">

  <!-- 📂 Primary Sidebar: Navigation & History -->
  <aside class="sidebar-resizable bg-panel overflow-hidden transition-all duration-300 border-r border-border"
         [style.width]="uiState.showHistory() ? '260px' : '68px'">
    <div class="h-full flex flex-col" [style.width]="uiState.showHistory() ? '260px' : '68px'">
       <app-left-panel />
    </div>
  </aside>

  <!-- 📂 Secondary Sidebar: Knowledge Base / Sources (Hidden by default) -->
  <aside class="sidebar-resizable bg-panel border-r border-border overflow-hidden transition-all duration-300"
         [style.width]="uiState.showSources() ? '300px' : '0px'">
    <div class="w-[300px] h-full flex flex-col pt-4 px-4">
       <!-- Sources will now go here if needed, or we keep it clean. 
            For now, let's keep it minimized to follow the SS. -->
       <p class="text-[11px] font-bold text-text-muted uppercase tracking-widest mb-4">Knowledge Base</p>
       <div class="flex-1 overflow-auto">
          <!-- We might need to move KB logic to another component if we want to show it here -->
       </div>
    </div>
  </aside>

  <!-- 💬 Center: Main Workspace/Chat Panel -->
  <main class="flex-1 flex flex-col min-w-0 relative bg-bg-main overflow-hidden">
    
    <!-- Top-most Ghost Toggle (Floating) - Only visible when sidebar is docked -->
    @if (!uiState.showHistory()) {
      <div class="absolute top-4 left-4 z-50">
        <button (click)="uiState.toggleHistory()"
                class="cursor-pointer p-2 flex rounded-lg border border-border bg-white hover:bg-stone-50 transition-all shadow-sm">
          <svg class="w-4 h-4 text-text-primary" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 2V14M5.2 2H10.8C11.9201 2 12.4802 2 12.908 2.21799C13.2843 2.40973 13.5903 2.71569 13.782 3.09202C14 3.51984 14 4.0799 14 5.2V10.8C14 11.9201 14 12.4802 13.782 12.908C13.5903 13.2843 13.2843 13.5903 12.908 13.782C12.4802 14 11.9201 14 10.8 14H5.2C4.07989 14 3.51984 14 3.09202 13.782C2.71569 13.5903 2.40973 13.2843 2.21799 12.908C2 12.4802 2 11.9201 2 10.8V5.2C2 4.07989 2 3.51984 2.21799 3.09202C2.40973 2.71569 2.71569 2.40973 3.09202 2.21799C3.51984 2 4.0799 2 5.2 2Z" 
                  stroke="currentColor" stroke-width="1.33" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </button>
      </div>
    }

    <app-chat-panel class="flex-1 flex flex-col h-full" />
  </main>

  <!-- 🔍 Collapsible Right Sidebar: Evidence -->
  <aside class="sidebar-resizable bg-panel border-l border-border overflow-hidden transition-all duration-300"
         [style.width]="uiState.showEvidence() ? '340px' : '0px'">
    <div class="w-[340px] h-full flex flex-col">
       <app-right-panel />
    </div>
  </aside>

</div>

<!-- PrimeNG Toast -->
<p-toast position="top-right" />
