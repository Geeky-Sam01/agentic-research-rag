<div class="flex flex-col h-full bg-bg-main overflow-hidden border-r border-border select-none">

  <!-- 1. Header Area (Varied by Expanded/Docked) -->
  <div class="py-5 px-4 flex flex-shrink-0" [class.flex-row]="uiState.showHistory()"
    [class.justify-between]="uiState.showHistory()" [class.items-center]="uiState.showHistory()"
    [class.flex-col]="!uiState.showHistory()" [class.gap-6]="!uiState.showHistory()"
    [class.items-center]="!uiState.showHistory()">

    <!-- Toggle Button (Hidden in Docked Mode) -->
    <button *ngIf="uiState.showHistory()" (click)="uiState.toggleHistory()"
      class="cursor-pointer p-1.5 flex rounded-sm hover:bg-stone-950/10 transition-colors order-last">
      <div class="self-center m-auto">
        <svg class="w-4 h-4 text-text-primary transition-transform duration-300 rotate-180" width="16" height="16"
          viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M6 2V14M5.2 2H10.8C11.9201 2 12.4802 2 12.908 2.21799C13.2843 2.40973 13.5903 2.71569 13.782 3.09202C14 3.51984 14 4.0799 14 5.2V10.8C14 11.9201 14 12.4802 13.782 12.908C13.5903 13.2843 13.2843 13.5903 12.908 13.782C12.4802 14 11.9201 14 10.8 14H5.2C4.07989 14 3.51984 14 3.09202 13.782C2.71569 13.5903 2.40973 13.2843 2.21799 12.908C2 12.4802 2 11.9201 2 10.8V5.2C2 4.07989 2 3.51984 2.21799 3.09202C2.40973 2.71569 2.71569 2.40973 3.09202 2.21799C3.51984 2 4.0799 2 5.2 2Z"
            stroke="currentColor" stroke-width="1.33" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
    </button>

    <!-- Logo (At Top in Docked, Left in Expanded) -->
    <div
      class="logo-box flex items-center justify-center transition-all bg-[#171717] text-white shadow-xl shadow-black/20"
      [class.w-8]="uiState.showHistory()" [class.h-8]="uiState.showHistory()" [class.rounded-lg]="uiState.showHistory()"
      [class.w-10]="!uiState.showHistory()" [class.h-10]="!uiState.showHistory()"
      [class.rounded-2xl]="!uiState.showHistory()" [class.order-first]="true">
      <span [class.text-base]="uiState.showHistory()" [class.text-xl]="!uiState.showHistory()"
        class="font-black">Fs</span>
    </div>
  </div>

  <!-- 2. Chat / Knowledge Selector Box -->
  <div class="px-3.5 mb-6">
    <div class="selector-box p-1 rounded-2xl bg-panel border border-border flex flex-col gap-1 shadow-sm"
      [class.items-center]="!uiState.showHistory()">
      
      <!-- Chat Mode -->
      <div (click)="uiState.setWorkspace('chat')" 
        class="selector-item" 
        [class.active-selector]="uiState.activeWorkspace() === 'chat'"
        [class.justify-center]="!uiState.showHistory()"
        [class.w-8]="!uiState.showHistory()" [class.h-8]="!uiState.showHistory()">
        <i class="pi pi-file-edit text-sm" [class.text-lg]="!uiState.showHistory()"></i>
        <span *ngIf="uiState.showHistory()">Chat</span>
      </div>

      <!-- Knowledge Mode -->
      <div (click)="uiState.setWorkspace('knowledge')"
        class="selector-item group" 
        [class.active-selector]="uiState.activeWorkspace() === 'knowledge'"
        [class.justify-center]="!uiState.showHistory()"
        [class.w-8]="!uiState.showHistory()" [class.h-8]="!uiState.showHistory()">
        <i class="pi pi-file text-sm group-hover:text-text-primary" [class.text-lg]="!uiState.showHistory()"></i>
        <span *ngIf="uiState.showHistory()" class="group-hover:text-text-primary">Knowledge</span>
      </div>
    </div>
  </div>

  <!-- 3. New Chat Button -->
  <div class="px-3.5 mb-4">
    <button (click)="newChat()"
      class="new-chat-btn w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all border border-transparent"
      [class.justify-center]="!uiState.showHistory()">
      <div class="w-7 h-7 rounded-full bg-bg-soft flex items-center justify-center border border-border flex-shrink-0">
        <i class="pi pi-plus text-[10px] text-text-muted"></i>
      </div>
      <span *ngIf="uiState.showHistory()" class="text-[13px] font-medium text-text-secondary whitespace-nowrap">New
        Chat</span>
    </button>
  </div>

  <!-- 4. Scrollable History List (Grouped) -->
  <div class="flex-1 overflow-y-auto px-3.5 pb-6 space-y-6 scroll-smooth" [class.hidden]="!uiState.showHistory()">

    @for (group of historyService.groupedSessions(); track group.label) {
    <div class="space-y-3">
      <!-- Group Header -->
      <h3 class="text-[11px] font-bold text-text-muted uppercase tracking-widest px-2" *ngIf="uiState.showHistory()">
        {{ group.label }}
      </h3>

      <!-- Group Items -->
      <div class="flex flex-col gap-0.5">
        @for (session of group.sessions; track session.id) {
        <div (click)="loadChat(session.id)" class="history-item group"
          [class.active-item]="historyService.currentSessionId() === session.id">
          <span class="truncate pr-4 leading-relaxed">
            {{ session.title }}
          </span>

          <button (click)="deleteChat($event, session.id)" class="delete-btn opacity-0 group-hover:opacity-100">
            <i class="pi pi-trash text-[10px]"></i>
          </button>
        </div>
        }
      </div>
    </div>
    } @empty {
    <div class="h-32 flex flex-col items-center justify-center gap-2 opacity-30">
      <i class="pi pi-comments text-2xl"></i>
      <p class="text-[11px] font-medium">No history yet</p>
    </div>
    }

  </div>
</div>
