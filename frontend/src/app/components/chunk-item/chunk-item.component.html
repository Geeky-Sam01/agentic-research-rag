<div class="chunk-card group rounded-xl p-4 mb-4 border transition-all duration-300 cursor-default"
     [class.selected-chunk]="isSelected"
     [class.border-accent]="isSelected"
     [class.border-border]="!isSelected"
     [class.bg-panel]="!isSelected"
     [class.bg-bg-soft]="isSelected">

  <!-- Metadata -->
  <div class="flex items-center justify-between mb-3.5 pb-2 border-b border-border/40">
    <div class="flex items-center gap-3">
      <div class="source-tag-box flex items-center gap-1.5 px-2 py-0.5 rounded-sm bg-bg-soft border border-border group-hover:border-accent/40 transition-colors">
        <i class="pi pi-file-o text-text-muted text-[10px]"></i>
        <span class="text-[9px] font-bold uppercase tracking-widest text-text-primary">
          {{ shortSourceId() }}
        </span>
      </div>
      <!-- Match percentage commented in HTML but logic kept in component if needed -->
      <!-- <span class="text-[9px] uppercase tracking-widest font-bold text-accent px-1.5 py-0.5 rounded bg-accent-soft border border-accent/20">
        {{ (chunk.similarity * 100) | number:'1.0-0' }}% Match
      </span> -->
    </div>
    <i class="pi pi-external-link opacity-40 group-hover:opacity-100 transition-all duration-300 text-text-muted text-xs cursor-pointer hover:text-accent"></i>
  </div>

  <!-- Content -->
  <p class="chunk-text text-[13.5px] leading-relaxed text-text-primary/90 font-medium">
    {{ chunk.text }}
  </p>

  <!-- Highlight Indicator -->
  @if (isSelected) {
    <div class="selected-indicator mt-4 pt-3 text-[10px] font-bold flex items-center gap-2 text-accent border-t border-accent/20 uppercase tracking-widest">
      <i class="pi pi-bolt animate-pulse"></i> Referenced in current assistant response
    </div>
  }
</div>
