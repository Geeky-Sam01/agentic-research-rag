    "pydantic==2.12.5",
    "pydantic-core==2.41.5",
    "pydantic-settings==2.13.1",
    "pymupdf==1.25.1",
    "pytesseract==0.3.13",
    "python-dotenv==1.2.2",
    "python-multipart==0.0.22",
    "pyyaml==6.0.2",
    "qdrant-client==1.17.1",
    "regex==2026.4.4",
    "requests==2.33.1",
    "sniffio==1.3.1",
    "sympy==1.14.0",
    "threadpoolctl==3.6.0",
    "tqdm==4.67.3",
    "transformers==4.46.3",
    "typing-extensions==4.15.0",
    "urllib3==2.6.3",
    "uvicorn==0.43.0",
    "yarl==1.23.0",
