[project]
name = "backend"
version = "0.1.0"
description = "FinSight RAG"
readme = "README.md"
requires-python = ">=3.12, <3.13"
dependencies = [
    "aiohttp==3.13.5",
    "aiosignal==1.4.0",
    "annotated-types==0.7.0",
    "anyio==4.13.0",
    "async-timeout==5.0.1",
    "attrs==26.1.0",
    "certifi==2026.2.25",
    "charset-normalizer==3.4.7",
    "click==8.3.2",
    "exceptiongroup==1.3.1",
    "fastapi==0.135.3",
    "filelock==3.25.2",
    "frozenlist==1.8.0",
    "fsspec==2026.3.0",
    "h11==0.16.0",
    "httpcore==1.0.9",
    "httpx==0.28.1",
    "huggingface-hub==0.24.0",
    "idna==3.11",
    "jinja2==3.1.6",
    "joblib==1.5.3",
    "langchain>=0.2.0",
    "langchain-core>=0.2.0",
    "langchain-openai>=0.1.0",
    "langgraph>=0.1.0",
    "markupsafe==3.0.3",
    "mftool>=2.0",
    "mpmath==1.3.0",
